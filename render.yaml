services:
  - type: web
    name: ashtech
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run db:deploy && npm run db:generate
    startCommand: npm run seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NAME
        value: AshTech Admin
      - key: ADMIN_PASSWORD
        sync: false
